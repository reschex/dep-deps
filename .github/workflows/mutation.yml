name: Mutation Testing

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: 
      - completed


permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run mutation testing
        run: npm run mutation
        # env:
        #   GITHUB_ACTIONS: false

      - name: Publish report to job summary
        if: always() && hashFiles('reports/mutation/mutation.json') != ''
        run: npx stryker-gha-ci-report --survived-mutants reports/mutation/mutation.json > $GITHUB_STEP_SUMMARY
